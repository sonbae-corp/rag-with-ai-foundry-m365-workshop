<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">DocusaurOps logo</title>
  <desc id="desc">Minimal DocusaurOps logo with a GitHub CLI dark terminal badge, a cubic Docusaurus-inspired dinosaur head, original-style repeated back plates, and DevOps pipeline details, with a clean dark CLI badge and transparent overall background.</desc>

  <defs>
    <linearGradient id="cli-accent" x1="54" y1="48" x2="190" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.46" stop-color="#8957e5"/>
      <stop offset="1" stop-color="#f778ba"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="216" y2="216" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="plate-gradient" x1="35" y1="20" x2="154" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7ee787"/>
      <stop offset="0.52" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#8957e5"/>
    </linearGradient>
    <style>
      .word{font-family:"Mona Sans",Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-weight:650;letter-spacing:-2px}
      .mono{font-family:ui-monospace,SFMono-Regular,SF Mono,Menlo,Consolas,"Liberation Mono",monospace;font-weight:700}
    </style>
  </defs>

  <g transform="translate(36 22)">
    <rect x="8" y="16" width="200" height="196" rx="44" fill="#0d1117" opacity="0.23"/>
    <rect x="0" y="0" width="216" height="216" rx="46" fill="url(#terminal)"/>
    <rect x="1.5" y="1.5" width="213" height="213" rx="44.5" fill="none" stroke="#30363d" stroke-width="3"/>

    <circle cx="34" cy="33" r="6" fill="#f778ba"/>
    <circle cx="55" cy="33" r="6" fill="#8957e5"/>
    <circle cx="76" cy="33" r="6" fill="#58a6ff"/>

    <g transform="translate(30 168)" opacity="0.96">
      <path d="M0 0l15 11L0 22" fill="none" stroke="#f0f6fc" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M24 22h21" fill="none" stroke="#f0f6fc" stroke-width="5.5" stroke-linecap="round"/>
    </g>

    <g transform="translate(40 30) scale(0.82)">
      <path d="M53 166H151C176 166 195 147 195 122V84C195 61 176 44 151 44H98C76 44 59 61 59 83V131L48 143V166Z" fill="#010409" opacity="0.55" transform="translate(5 7)"/>

      <!-- Original Docusaurus-style back plates: repeated triangular tabs down the back and three crown plates on top. -->
      <g fill="url(#plate-gradient)" stroke="#010409" stroke-width="4.2" stroke-linejoin="round">
        <path d="M60 56L39 64L60 72Z"/>
        <path d="M60 76L39 84L60 92Z"/>
        <path d="M60 96L39 104L60 112Z"/>
        <path d="M60 116L39 124L60 132Z"/>
        <path d="M60 136L39 144L60 152Z"/>
        <path d="M60 156L39 164L60 172Z"/>
        <path d="M72 45L82 21L97 45Z"/>
        <path d="M101 44L112 19L128 44Z"/>
        <path d="M132 44L145 22L160 45Z"/>
      </g>

      <!-- Cubic profile head with dark edges, no light border. -->
      <path d="M59 166H151C176 166 195 147 195 122V84C195 61 176 44 151 44H98C76 44 59 61 59 83V130L48 142V166Z"
            fill="url(#cli-accent)" stroke="#010409" stroke-width="5.4" stroke-linejoin="round"/>

      <!-- A small dark lower jaw notch makes the head read as a profile, not a rounded square. -->
      <path d="M145 126H194V135C194 153 177 166 151 166H129C136 157 142 144 145 126Z" fill="#010409" opacity="0.12"/>

      <!-- Docusaurus-like mouth strip, cubic and internal. -->
      <path d="M122 91H195V123H128C117 123 109 116 109 107C109 98 114 91 122 91Z"
            fill="#f0f6fc" stroke="#010409" stroke-width="3.8" stroke-linejoin="round"/>
      <path d="M128 107C135 99 142 115 149 107C156 99 163 115 170 107C177 99 184 115 191 107" fill="none" stroke="#010409" stroke-width="3.7" stroke-linecap="round" stroke-linejoin="round"/>

      <path d="M84 86C88 72 104 72 108 86" fill="none" stroke="#010409" stroke-width="5.8" stroke-linecap="round"/>
      <circle cx="157" cy="72" r="3.5" fill="#010409"/>
      <circle cx="180" cy="72" r="3.5" fill="#010409"/>

      <!-- DevOps pipeline kept inside the head/neck, with dark backing so it stays legible on the gradient. -->
      <path d="M73 141H108C121 141 122 130 136 130H166" fill="none" stroke="#010409" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.38"/>
      <path d="M73 141H108C121 141 122 130 136 130H166" fill="none" stroke="#7ee787" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="73" cy="141" r="8.5" fill="#010409" stroke="#7ee787" stroke-width="4"/>
      <circle cx="111" cy="141" r="8.5" fill="#010409" stroke="#7ee787" stroke-width="4"/>
      <circle cx="166" cy="130" r="8.5" fill="#010409" stroke="#7ee787" stroke-width="4"/>
    </g>
  </g>

  <g transform="translate(300 0)">
    <text class="word" x="0" y="151" font-size="70">
      <tspan fill="#f0f6fc">Docusaur</tspan><tspan fill="url(#cli-accent)" font-weight="800">Ops</tspan>
    </text>
  </g>
</svg>
